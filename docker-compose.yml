services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: janam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      JANAM_DB_BACKEND: postgres
      JANAM_DATABASE_URL: postgresql://postgres:postgres@db:5432/janam
      JANAM_LOG_PATH: /var/log/janam/janam.log
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - janam_logs:/var/log/janam
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5500:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  janam_logs: