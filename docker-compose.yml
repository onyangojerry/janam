services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      JANAM_DB_PATH: /var/lib/janam/janam.sqlite3
      JANAM_LOG_PATH: /var/log/janam/janam.log
    ports:
      - "8000:8000"
    volumes:
      - janam_data:/var/lib/janam
      - janam_logs:/var/log/janam
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5500:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  janam_data:
  janam_logs: